<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazy Loading Images</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
        }

        h1 {
            margin: 40px 0;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .lazy-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            margin-bottom: 40px;

            filter: blur(20px);
            transition: filter 0.5s;
        }

        .lazy-img.loaded {
            filter: blur(0);
        }

        .spacer {
            height: 500px;
        }
    </style>
</head>

<body>

    <h1>Lazy Loading Images Demo</h1>

    <div class="container">

        <img data-src="img1.jpg" src="" class="lazy-img" alt="image1">
        <div class="spacer"></div>
        <img data-src="img2.jpg" src="" class="lazy-img" alt="image2">
        <div class="spacer"></div>
        <img data-src="img3.jpg" src="" class="lazy-img" alt="image3">
        <div class="spacer"></div>
        <img data-src="img4.jpg" src="" class="lazy-img" alt="image4">
        <div class="spacer"></div>
        <img data-src="img5.jpg" src="" class="lazy-img" alt="image5">

    </div>
    <script src="script.js"></script>
</body>

</html>
