<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        const c = 100; // global scope
        let dummy = function () {
            var a = 20; // function scope
            let b = 10; // function scope
            console.log(a);
            console.log(b);
            console.log(c);
        }

        if(true) {
            let x = "for";
            console.log(c);
            console.log(x); // block scope
        }
        // console.log(x);
        dummy();
        console.log(c);
    </script>
</body>

</html>
